services:
  postgres:
    image: postgres:16-alpine
    container_name: flag-postgres
    environment:
      POSTGRES_USER: flag_user
      POSTGRES_PASSWORD: flag_password
      POSTGRES_DB: flags_db
    ports:
      - "5433:5432"
    networks:
      - microservices-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flag_user -d flags_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  flag-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flag-service
    environment:
      AUTH_SERVICE_URL: "http://auth-service:8001"
      PORT: "8002"
      DATABASE_URL: "postgres://flag_user:flag_password@postgres:5432/flags_db"
    ports:
      - "8002:8002"
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  microservices-network:
    external: true